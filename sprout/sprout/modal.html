<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Tracker — Modal Test</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <h1>Modal test page</h1>

  <!-- Test buttons -->
  <button id="addExpenseBtn" onclick="openModal('expenses-modal')">Add Expense</button>
  <button id="addTransactionBtn" onclick="openModal('transactions-modal')">Add Transaction</button>
  <button id="addSavingsBtn" onclick="openModal('savings-modal')">Add Savings Goal</button>


  <!-- Savings modal -->
  <div class="modal-overlay" id="savings-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Add savings goal</h2>
        <button class="btn-close" onclick="closeModal('savings-modal')">&times;</button>
      </div>
      <form id="savings-form">
        <div class="field">
          <label for="savings-name">Savings goal</label>
          <input type="text" id="savings-name" placeholder="e.g. Vacation, Emergency fund" required />
        </div>
        <div class="field">
          <label for="savings-target">Target amount ($)</label>
          <input type="number" id="savings-target" placeholder="0.00" min="0.01" step="0.01" required />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="closeModal('savings-modal')">Cancel</button>
          <button type="submit" class="btn-submit">Add goal</button>
        </div>
      </form>
    </div>
  </div>


  <!-- Expenses modal -->
  <div class="modal-overlay" id="expenses-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Add expense</h2>
        <button class="btn-close" onclick="closeModal('expenses-modal')">&times;</button>
      </div>
      <form id="expenses-form">
        <div class="field">
          <label for="expense-date">Date</label>
          <input type="date" id="expense-date" required />
        </div>
        <div class="field">
          <label for="expense-name">Expense name</label>
          <input type="text" id="expense-name" placeholder="e.g. Groceries, Rent" required />
        </div>
        <div class="field">
          <label for="expense-amount">Amount ($)</label>
          <input type="number" id="expense-amount" placeholder="0.00" min="0.01" step="0.01" required />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="closeModal('expenses-modal')">Cancel</button>
          <button type="submit" class="btn-submit">Add expense</button>
        </div>
      </form>
    </div>
  </div>


  <!-- Transactions modal -->
  <div class="modal-overlay" id="transactions-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Add transaction</h2>
        <button class="btn-close" onclick="closeModal('transactions-modal')">&times;</button>
      </div>
      <form id="transactions-form">
        <div class="field">
          <label for="transaction-date">Date</label>
          <input type="date" id="transaction-date" required />
        </div>
        <div class="field">
          <label for="transaction-category">Category</label>
          <select id="transaction-category" required></select>
        </div>
        <div class="field">
          <label for="transaction-name">Name</label>
          <input type="text" id="transaction-name" placeholder="e.g. Shopping, Subscriptions" required />
        </div>
        <div class="field">
          <label for="transaction-amount">Amount ($)</label>
          <input type="number" id="transaction-amount" placeholder="0.00" min="0.01" step="0.01" required />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="closeModal('transactions-modal')">Cancel</button>
          <button type="submit" class="btn-submit">Add transaction</button>
        </div>
      </form>
    </div>
  </div>


  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/savings.js"></script>
  <script src="js/expenses.js"></script>
  <script src="js/transactions.js"></script>

</body>
</html>
